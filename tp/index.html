<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Libreria</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="p-8 bg-gradient-to-t from-slate-800 to-slate-300 min-h-screen font-mono">

  <header class="flex items-center justify-center">
    <h1 class="text-5xl text-center font-bold mb-6">Gestión de Inventario</h1>
  </header>

  <nav class="rounded-sm border-b bg-slate-500/10 backdrop-blur-md py-4">
    <div class="max-w-7xl mx-auto flex justify-between">
      <span class="text-xl font-bold ml-4 text-stone-700 font-mono tracking-wider">Bienvenido</span>
      <div class="flex gap-4">
        <button id="boton_explorar" class="text-sm font-medium 
        transition-colors duration-300 text-stone-600 px-2 py-1 
        border-b-2 border-stone-300">
          Explorar
        </button>
        <button id="boton_revisar" class="text-sm font-medium 
        transition-colors duration-300 px-2 py-1">
          Revisar
        </button>
      </div>
    </div>
  </nav>

  <main>

    <div id="mensaje" class="flex-auto bg-slate-300 font-semibold text-gray-700 p-4 rounded overflow-auto font-mono text-center text-sm mx-auto mt-16">
      Click en "Mostrar Artículos" para ver el listado. Los cambios realizados se mostraran en el listado automaticamente.
    </div>

    <div class="min-w-[500px]">
      <table id="tablaArticulos" class="hidden text-center w-full mx-auto border-collapse border-2 border-gray-600 px-2 py-1 col-span-2 mt-8">
        <thead class="font-bold">
          <tr>
            <th class="border-2 border-gray-600 px-2 py-1">ID</th>
            <th class="border-2 border-gray-600 px-2 py-1">Nombre</th>
            <th class="border-2 border-gray-600 px-2 py-1">Precio</th>
            <th class="border-2 border-gray-600 px-2 py-1">Estado</th>
            <th class="border-2 border-gray-600 px-2 py-1">Seleccionar</th>
          </tr>
        </thead>
      <tbody></tbody>
      </table>
    </div>

  </main>

  <section id="inicio" class="block w-full overflow-auto flex-auto flex-wrap grid grid-cols-2 grid-rows-[auto,1fr] gap-4 mt-8">

    <button id="boton_mostrar" class="place-self-center col-span-2 bg-amber-600 text-white px-4 py-2 rounded hover:bg-amber-500" onclick="listarArticulos()">
      Mostrar Artículos
    </button>

    <article class="content-center flex flex-col w-full min-w-6xl max-w-full overflow-x-auto p-6 bg-slate-300/10 rounded shadow mx-auto gap-2">
        <h2 class="text-center text-3xl font-bold mb-4">Crear artículo</h2>
        <input class="w-full p-2 border border-gray-300 rounded" type="text" id="nombreNuevo" placeholder="Nombre" />
        <input class="w-full p-2 border border-gray-300 rounded" type="number" id="precioNuevo" placeholder="Precio (>=500)" />
        <label class="text-center m-4">
          <input class="form-checkbox w-4 h-4" type="checkbox" id="activoNuevo" checked /> Activo
        </label>
      <button class="bg-green-600 text-xl text-white px-4 py-2 rounded hover:bg-green-500" onclick="crearArticulo()">Crear</button>
    </article>

    <article class="flex flex-col w-full max-w-full overflow-x-auto p-6 bg-slate-300/10 rounded shadow mx-auto gap-2">
      <div class="flex gap-4 mb-4 w-full justify-evenly">
        <h2 class="flex text-3xl items-center space-x-2 font-bold"><input type="checkbox" id="editar" class="form-checkbox w-4 h-4" /><span>Editar</span></h2>
        <h2 class="flex text-3xl items-center space-x-2 font-bold"><input type="checkbox" id="borrar" class="form-checkbox w-4 h-4" /><span>Borrar</span></h2>
      </div>
      <input disabled = true class="w-full p-2 border border-gray-300 rounded" type="number" id="idEditar" placeholder="ID" />
      <input disabled = true class="w-full p-2 border border-gray-300 rounded" type="text" id="nombreEditar" placeholder="Nuevo nombre" />
      <input disabled = true class="w-full p-2 border border-gray-300 rounded" type="number" id="precioEditar" placeholder="Nuevo precio" />
      <label class="text-center">
        <input disabled = true class="form-checkbox w-4 h-4" type="checkbox" id="activoEditar" /> Activo
      </label>
      <div class="flex gap-4 mb-4 w-full justify-evenly">
        <button id="boton_editar" disabled="true" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-500 text-xl" onclick="editarArticulo()">Editar</button>
        <button id="boton_borrar" disabled="true" class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-500 text-xl" onclick="borrarArticulo()">Borrar</button>
      </div>
    </article>

  </section>

  <script src="main.js"></script>

</body>
</html>
